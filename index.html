<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Vitalis - Painel Financeiro</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:linear-gradient(135deg,#eef2f7,#f8fafc);
    }

    .login-screen{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-card{
      width:420px;
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.1);
      text-align:center;
    }

    .logo{
      width:220px;
      margin-bottom:20px;
    }

    h1{
      margin:0;
      font-size:28px;
      font-weight:700;
    }

    .subtitle{
      color:#64748b;
      margin-bottom:30px;
    }

    .input-group{
      text-align:left;
      margin-bottom:20px;
    }

    .input-group label{
      font-weight:600;
      display:block;
      margin-bottom:8px;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
    }

    input:focus{
      border-color:#e11d2a;
      outline:none;
      box-shadow:0 0 0 3px rgba(225,29,42,0.1);
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#e11d2a,#b80000);
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .error{
      color:red;
      margin-top:10px;
      display:none;
    }
  </style>
</head>

<body>

<div class="login-screen">
  <div class="login-card">

    <!-- Substitua pelo caminho correto do logo -->
    <img src="logo.png" class="logo" alt="Vitalis">

    <h1>Painel Financeiro</h1>
    <p class="subtitle">Acesso restrito à Direcção da Vitalis</p>

    <div class="input-group">
      <label>Senha de acesso</label>
      <input type="password" id="password" placeholder="Digite a senha">
    </div>

    <button onclick="login()">Entrar</button>

    <div class="error" id="error">Senha incorrecta</div>

  </div>
</div>

<script>
  function login(){
    const password = document.getElementById("password").value;

    // ⚠️ TEMPORÁRIO - NÃO SEGURO (apenas para controlo básico)
    if(password === "12345"){
      window.location.href = "#despesas";
    }else{
      document.getElementById("error").style.display = "block";
    }
  }
</script>

</body>
</html>
